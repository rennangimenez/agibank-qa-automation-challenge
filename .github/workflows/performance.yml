name: Performance Tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      test-plan:
        description: 'Which performance tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - blazedemo-load-test
          - blazedemo-spike-test

jobs:
  setup:
    name: Setup Monitoring
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monitoring config
        run: |
          sudo mkdir -p /opt/monitoring
          sudo rsync -avz --delete --exclude 'scripts/' infra/ /opt/monitoring/
          cd /opt/monitoring && sudo docker compose up -d

      - name: Wait for InfluxDB to be ready
        run: |
          echo "Waiting for InfluxDB..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8086/ping > /dev/null 2>&1; then
              echo "InfluxDB is healthy after $i attempt(s)"
              curl -sf "http://localhost:8086/query?q=SHOW+DATABASES" | grep -q jmeter && echo "Database 'jmeter' exists" || echo "WARNING: database 'jmeter' not found yet"
              exit 0
            fi
            echo "  attempt $i/20 - waiting..."
            sleep 3
          done
          echo "ERROR: InfluxDB not reachable after 60s"
          exit 1

  load-test:
    name: ⚡ Load Test
    needs: setup
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.test-plan == 'all' ||
      github.event.inputs.test-plan == 'blazedemo-load-test'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run Load Test
        run: ./mvnw clean verify -pl performance-tests -Djmeter.test=blazedemo-load-test

      - name: Generate custom performance report
        if: always()
        run: |
          CSV_FILE=$(find performance-tests/target/jmeter/results -name "*.csv" | head -1)
          if [ -n "$CSV_FILE" ]; then
            python3 infra/scripts/generate-performance-report.py \
              "$CSV_FILE" \
              performance-tests/target/custom-report \
              "Load Test"
          else
            echo "WARNING: No CSV results found, skipping custom report"
          fi

      - name: Deploy Load Test Report
        if: always()
        run: |
          DEPLOY_DIR="/srv/apps/agibank-challenge-reports/performance/load"
          mkdir -p "$DEPLOY_DIR"
          REPORT_DIR=$(find performance-tests/target/jmeter/reports -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -n "$REPORT_DIR" ]; then
            rsync -avz --delete "$REPORT_DIR/" "$DEPLOY_DIR/jmeter-dashboard/"
          fi
          if [ -f "performance-tests/target/custom-report/index.html" ]; then
            cp performance-tests/target/custom-report/index.html "$DEPLOY_DIR/index.html"
          fi

      - name: Push Pipeline Metrics
        if: always()
        run: |
          chmod +x infra/scripts/push-pipeline-metrics.sh
          DURATION=$(( $(date +%s) - $JOB_START ))
          STATUS="${{ job.status }}"
          bash infra/scripts/push-pipeline-metrics.sh \
            performance-load \
            "$STATUS" \
            "$DURATION" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.run_id }}"
        continue-on-error: true

  spike-test:
    name: 📈 Spike Test
    needs: [setup, load-test]
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (github.event_name == 'schedule' ||
      github.event.inputs.test-plan == 'all' ||
      github.event.inputs.test-plan == 'blazedemo-spike-test')
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run Spike Test
        run: ./mvnw clean verify -pl performance-tests -Djmeter.test=blazedemo-spike-test

      - name: Generate custom performance report
        if: always()
        run: |
          CSV_FILE=$(find performance-tests/target/jmeter/results -name "*.csv" | head -1)
          if [ -n "$CSV_FILE" ]; then
            python3 infra/scripts/generate-performance-report.py \
              "$CSV_FILE" \
              performance-tests/target/custom-report \
              "Spike Test"
          else
            echo "WARNING: No CSV results found, skipping custom report"
          fi

      - name: Deploy Spike Test Report
        if: always()
        run: |
          DEPLOY_DIR="/srv/apps/agibank-challenge-reports/performance/spike"
          mkdir -p "$DEPLOY_DIR"
          REPORT_DIR=$(find performance-tests/target/jmeter/reports -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -n "$REPORT_DIR" ]; then
            rsync -avz --delete "$REPORT_DIR/" "$DEPLOY_DIR/jmeter-dashboard/"
          fi
          if [ -f "performance-tests/target/custom-report/index.html" ]; then
            cp performance-tests/target/custom-report/index.html "$DEPLOY_DIR/index.html"
          fi

      - name: Push Pipeline Metrics
        if: always()
        run: |
          chmod +x infra/scripts/push-pipeline-metrics.sh
          DURATION=$(( $(date +%s) - $JOB_START ))
          STATUS="${{ job.status }}"
          bash infra/scripts/push-pipeline-metrics.sh \
            performance-spike \
            "$STATUS" \
            "$DURATION" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.run_id }}"
        continue-on-error: true

  deploy-index:
    name: 📊 Deploy Performance Index
    needs: [load-test, spike-test]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate performance index page
        run: |
          DEPLOY_DIR="/srv/apps/agibank-challenge-reports/performance"
          NOW=$(date -u '+%d/%m/%Y %H:%M UTC')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LOAD_STATUS="${{ needs.load-test.result }}"
          SPIKE_STATUS="${{ needs.spike-test.result }}"

          # Map status to emoji
          load_emoji="⏭️"; spike_emoji="⏭️"
          [ "$LOAD_STATUS" = "success" ] && load_emoji="✅"
          [ "$LOAD_STATUS" = "failure" ] && load_emoji="❌"
          [ "$SPIKE_STATUS" = "success" ] && spike_emoji="✅"
          [ "$SPIKE_STATUS" = "failure" ] && spike_emoji="❌"

          cat > "$DEPLOY_DIR/index.html" <<HTMLEOF
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>✈️ Performance Reports — AgiBank QA</title>
          <style>
            :root { --bg:#0f172a; --s:#1e293b; --s2:#334155; --t:#e2e8f0; --tm:#94a3b8; --a:#60a5fa; --g:#34d399; --r:#f87171; --y:#fbbf24; }
            * { margin:0; padding:0; box-sizing:border-box; }
            body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--t); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
            .header { text-align:center; padding:3rem 2rem 2rem; width:100%; background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 50%,#1a1a2e 100%); border-bottom:3px solid var(--a); }
            .header h1 { font-size:2.5rem; background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
            .header p { color:var(--tm); margin-top:.5rem; }
            .meta { display:flex; justify-content:center; gap:1.5rem; margin-top:1.5rem; flex-wrap:wrap; }
            .meta span { background:var(--s); padding:.4rem 1rem; border-radius:999px; font-size:.85rem; color:var(--tm); }
            .container { max-width:900px; width:100%; padding:2rem; }
            .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:1.5rem; margin-top:1rem; }
            .card { background:var(--s); border-radius:16px; padding:2rem; border:1px solid var(--s2); transition:transform .2s,box-shadow .2s; text-decoration:none; color:var(--t); display:block; }
            .card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.4); border-color:var(--a); }
            .card-icon { font-size:3rem; margin-bottom:1rem; }
            .card h2 { font-size:1.4rem; margin-bottom:.5rem; }
            .card p { color:var(--tm); font-size:.9rem; line-height:1.5; }
            .card .status { display:inline-block; margin-top:1rem; padding:.3rem .8rem; border-radius:999px; font-size:.8rem; font-weight:600; }
            .status-success { background:#10b98120; color:var(--g); }
            .status-failure { background:#ef444420; color:var(--r); }
            .status-skipped { background:#f59e0b20; color:var(--y); }
            .links { margin-top:2rem; text-align:center; }
            .links a { color:var(--a); text-decoration:none; margin:0 1rem; font-size:.9rem; }
            .links a:hover { text-decoration:underline; }
            .footer { text-align:center; padding:2rem; color:var(--tm); font-size:.85rem; margin-top:auto; }
          </style>
          </head>
          <body>
          <div class="header">
            <h1>✈️ Performance Reports</h1>
            <p>AgiBank QA Automation Challenge — BlazeDemo Flight Purchase</p>
            <div class="meta">
              <span>📅 ${NOW}</span>
              <span>🔧 JMeter 5.6.3</span>
              <span>🖥️ Self-hosted Runner (VPS)</span>
            </div>
          </div>
          <div class="container">
            <div class="cards">
              <a class="card" href="load/">
                <div class="card-icon">⚡</div>
                <h2>Load Test</h2>
                <p>Carga sustentada com <strong>150 threads</strong> durante <strong>240 segundos</strong> (ramp-up de 60s). Avalia throughput, response time e taxa de erro sob carga constante.</p>
                <span class="status status-${LOAD_STATUS}">${load_emoji} ${LOAD_STATUS}</span>
              </a>
              <a class="card" href="spike/">
                <div class="card-icon">📈</div>
                <h2>Spike Test</h2>
                <p>Burst de tráfego em <strong>3 fases</strong>: warm-up (30t) → spike (<strong>200 threads</strong>) → cool-down (30t). Avalia resiliência e recuperação pós-pico.</p>
                <span class="status status-${SPIKE_STATUS}">${spike_emoji} ${SPIKE_STATUS}</span>
              </a>
            </div>
            <div class="links">
              <a href="${RUN_URL}">🔄 GitHub Actions Run</a>
              <a href="https://rennangimenez.com/grafana/">📈 Grafana Dashboards</a>
              <a href="https://rennangimenez.com/agibank-challenge/">📊 Todos os Reports</a>
            </div>
          </div>
          <div class="footer">
            <p>Feito com ☕ por <strong>Rennan Gimenez</strong></p>
          </div>
          </body>
          </html>
          HTMLEOF
          sed -i 's/^          //' "$DEPLOY_DIR/index.html"
