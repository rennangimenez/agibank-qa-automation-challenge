name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  deploy-monitoring:
    name: Deploy Monitoring Stack
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monitoring config to /opt/monitoring
        run: |
          sudo mkdir -p /opt/monitoring
          sudo rsync -avz --delete \
            --exclude 'scripts/' \
            infra/ /opt/monitoring/

      - name: Ensure monitoring stack is running
        run: |
          cd /opt/monitoring
          sudo docker compose up -d --force-recreate grafana
          sudo docker compose up -d influxdb
          echo "Waiting for InfluxDB..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8086/ping > /dev/null 2>&1; then
              echo "InfluxDB is healthy"
              break
            fi
            echo "  attempt $i/15..."
            sleep 2
          done
          echo "Waiting for Grafana..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Grafana is healthy"
              break
            fi
            echo "  attempt $i/10..."
            sleep 2
          done

  api-tests:
    name: API Tests
    needs: deploy-monitoring
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run API Tests
        run: ./mvnw clean test -pl api-tests

      - name: Generate Allure environment.properties
        if: always()
        run: |
          RESULTS_DIR="api-tests/target/allure-results"
          mkdir -p "$RESULTS_DIR"
          cat > "$RESULTS_DIR/environment.properties" <<EOF
          Java.Version=17
          Test.Type=API
          Framework=RestAssured 5.4.0
          Base.URL=https://dog.ceo/api
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Execution.Date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Runner=${{ runner.name }}
          Trigger=${{ github.event_name }}
          EOF
          sed -i 's/^[[:space:]]*//' "$RESULTS_DIR/environment.properties"

      - name: Generate Allure executor.json
        if: always()
        run: |
          RESULTS_DIR="api-tests/target/allure-results"
          cat > "$RESULTS_DIR/executor.json" <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "CI #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://rennangimenez.com/agibank-challenge/api/"
          }
          EOF

      - name: Restore Allure history
        if: always()
        run: |
          PREV_HISTORY="/srv/apps/agibank-challenge-reports/api/history"
          RESULTS_DIR="api-tests/target/allure-results"
          if [ -d "$PREV_HISTORY" ]; then
            echo "Restoring Allure history from previous report..."
            cp -r "$PREV_HISTORY" "$RESULTS_DIR/history"
          else
            echo "No previous history found, skipping."
          fi

      - name: Generate Allure Report
        if: always()
        run: allure generate api-tests/target/allure-results -o api-tests/target/allure-report --clean

      - name: Deploy API Report
        if: always()
        run: rsync -avz --delete api-tests/target/allure-report/ /srv/apps/agibank-challenge-reports/api/

      - name: Push API Metrics to InfluxDB
        if: always()
        run: |
          chmod +x infra/scripts/push-allure-metrics.sh
          bash infra/scripts/push-allure-metrics.sh \
            api-tests/target/allure-report \
            api \
            "${{ github.ref_name }}" \
            "${{ github.sha }}"
        continue-on-error: true

      - name: Push Pipeline Metrics
        if: always()
        run: |
          chmod +x infra/scripts/push-pipeline-metrics.sh
          DURATION=$(( $(date +%s) - $JOB_START ))
          STATUS="${{ job.status }}"
          bash infra/scripts/push-pipeline-metrics.sh \
            api-tests \
            "$STATUS" \
            "$DURATION" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.run_id }}"
        continue-on-error: true

  web-tests:
    name: Web Tests
    needs: deploy-monitoring
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Install Playwright System Dependencies
        run: sudo npx -y playwright install-deps chromium

      - name: Install Playwright Browsers
        run: ./mvnw exec:java -pl web-tests -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Run Web Tests
        run: ./mvnw clean test -pl web-tests

      - name: Generate Allure environment.properties
        if: always()
        run: |
          RESULTS_DIR="web-tests/target/allure-results"
          mkdir -p "$RESULTS_DIR"
          cat > "$RESULTS_DIR/environment.properties" <<EOF
          Java.Version=17
          Test.Type=Web
          Framework=Playwright 1.44.0
          Browser=Chromium (headless)
          Viewport=1920x1080
          Base.URL=https://blogdoagi.com.br
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Execution.Date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Runner=${{ runner.name }}
          Trigger=${{ github.event_name }}
          EOF
          sed -i 's/^[[:space:]]*//' "$RESULTS_DIR/environment.properties"

      - name: Generate Allure executor.json
        if: always()
        run: |
          RESULTS_DIR="web-tests/target/allure-results"
          cat > "$RESULTS_DIR/executor.json" <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "CI #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://rennangimenez.com/agibank-challenge/web/"
          }
          EOF

      - name: Restore Allure history
        if: always()
        run: |
          PREV_HISTORY="/srv/apps/agibank-challenge-reports/web/history"
          RESULTS_DIR="web-tests/target/allure-results"
          if [ -d "$PREV_HISTORY" ]; then
            echo "Restoring Allure history from previous report..."
            cp -r "$PREV_HISTORY" "$RESULTS_DIR/history"
          else
            echo "No previous history found, skipping."
          fi

      - name: Generate Allure Report
        if: always()
        run: allure generate web-tests/target/allure-results -o web-tests/target/allure-report --clean

      - name: Deploy Web Report
        if: always()
        run: rsync -avz --delete web-tests/target/allure-report/ /srv/apps/agibank-challenge-reports/web/

      - name: Push Web Metrics to InfluxDB
        if: always()
        run: |
          chmod +x infra/scripts/push-allure-metrics.sh
          bash infra/scripts/push-allure-metrics.sh \
            web-tests/target/allure-report \
            web \
            "${{ github.ref_name }}" \
            "${{ github.sha }}"
        continue-on-error: true

      - name: Push Pipeline Metrics
        if: always()
        run: |
          chmod +x infra/scripts/push-pipeline-metrics.sh
          DURATION=$(( $(date +%s) - $JOB_START ))
          STATUS="${{ job.status }}"
          bash infra/scripts/push-pipeline-metrics.sh \
            web-tests \
            "$STATUS" \
            "$DURATION" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.run_id }}"
        continue-on-error: true
